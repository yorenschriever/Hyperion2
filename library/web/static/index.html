<html>
    <head>
        <!-- <meta name="viewport" content="width=device-width, initial-scale=0.5"> -->
        <link rel="stylesheet" href="controller/controller.css">
        <link rel="stylesheet" href="controller/palettes.css">
        <link rel="stylesheet" href="monitor/monitor.css">
        <link rel="stylesheet" href="toolbar/toolbar.css">
        <link rel="stylesheet" href="sequencer/sequencer.css">
        <link rel="stylesheet" href="analytics/analytics.css">

        <style>
            :root {
                color-scheme: dark;
            }

            #monitors {
                display: flex;
                grid-area: monitors;
            }

            #sequencer {
                grid-area: sequencer;
            }

            #controller {
                grid-area: controller;
            }

            #analytics {
                position: fixed;
                background-color:#222;
                border:#444 1px solid;
                overflow: scroll;
                
                bottom: 96px;
                left: 16px;
                max-height: calc(100vh - 128px);
            }

            @media (aspect-ratio > 21/9) {
                body {
                    height: 100dvh;
                    display: grid;
                    grid-template-columns: auto 25vw;
                    grid-template-rows: min-content auto;
                    grid-template-areas: 
                        "sequencer monitors"
                        "controller monitors";
                }

                body.noMonitor {
                    grid-template-columns: auto;
                }

                #controller {
                    overflow: scroll;
                }

                #monitors {
                    flex-direction: column;
                    align-content: stretch;
                    height: 100dvh;
                }
            }

            @media (aspect-ratio < 9/16) {
                body {
                    height: 100dvh;
                    display: grid;
                    grid-template-rows: min-content auto 25vh;
                    grid-template-areas: 
                        "sequencer"
                        "controller"
                        "monitors";
                }

                body.noMonitor {
                    grid-template-rows: min-content auto;
                }

                #controller {
                    overflow: scroll;
                }

                #monitors {
                    flex-direction: row;
                    align-content: stretch;
                }
            }

            @media (9/16 <= aspect-ratio <= 21/9)  {
                #monitors {
                    position: fixed;
                    right:16px;
                    bottom: 16px;
                    gap: 16px;
                    flex-direction: column;
                    max-height: calc(100vh - 32px);
                }

                .monitor {
                    width: 640px;
                    height: 480px;
                }
            }
        </style>
        </link>
        <title>Controller - Hyperion</title>
        <script type="module">
            import { ControllerApp } from "./controller/controller.js"
            import { MonitorApp } from "./monitor/monitor.js"
            import { SequencerApp } from "./sequencer/sequencer.js"
            import { Toolbar } from "./toolbar/toolbar.js"
            import { AnalyticsApp } from "./analytics/analytics.js"
            import { html, render } from './common/preact-standalone.js'

            render(html`<${ControllerApp}/>`, document.getElementById('controller'));
            render(html`<${MonitorApp}/>`, document.getElementById('monitors'));
            render(html`<${SequencerApp}/>`, document.getElementById('sequencer'));
            render(html`<${Toolbar}/>`, document.getElementById('toolbar'));
                
            const onBuildIdChange = () =>
            {
                window.location.reload();
            }
            window.onBuildIdChange=onBuildIdChange

            window.addEventListener("message", (event) => {
                if (event.data.type !== "toggleMonitor") return;

                if (event.data.state) {
                    render(html`<${MonitorApp}/>`, document.getElementById('monitors'));
                    document.body.classList.toggle("noMonitor", false);
                } else {
                    render(null, document.getElementById('monitors'));
                    document.body.classList.toggle("noMonitor", true);
                }
            });

            window.addEventListener("message", (event) => {
                if (event.data.type !== "toggleAnalytics") return;

                const analyticsElem = document.getElementById('analytics');
                if (event.data.state) {
                    render(html`<${AnalyticsApp}/>`, analyticsElem);
                } else {
                    render(null, analyticsElem);
                }
            });

        </script>
    </head>
    <body>
        <div id="sequencer"></div>
        <div id="controller"></div>
        <div id="monitors"></div>
        <div id="analytics"></div>
        <div id="toolbar"></div>
    </body>
</html>
